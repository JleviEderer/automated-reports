<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<link rel="stylesheet" href="../styles/print.css">
</head>
<body>

<!-- Header Block — no cover page, compact title block -->
<div class="memo-header">
  <div class="memo-title">{{ title }}</div>
  <div class="memo-meta">
    <span class="meta-line"><span class="meta-label">Date:</span> {{ date }}</span>
    <span class="meta-line"><span class="meta-label">Author:</span> {{ author }}</span>
    <span class="meta-line">{{ document_type }}</span>
  </div>
</div>

<!-- Body Content — continuous flow, no forced page breaks -->
<div class="content">
  {% for section in sections %}
  <div class="section">
    <h2>{{ section.title }}</h2>
    {{ section.body | safe }}
  </div>
  {% endfor %}

  {% if appendices %}
  <div class="appendix-separator">
    <h2>Appendix</h2>
  </div>
  {% for appendix in appendices %}
  <div class="section">
    {{ appendix.body | safe }}
  </div>
  {% endfor %}
  {% endif %}
</div>

</body>
</html>
