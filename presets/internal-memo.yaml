name: "Internal Memo"
description: "Ruthlessly concise 1-2 page memo for internal audiences who already have context"

content:
  tone: |
    Direct, concise, action-oriented. Write for busy internal stakeholders
    who already know the company. Skip preambles. Lead with conclusions.
  structure: |
    HARD CONSTRAINT: The final PDF must be 2 pages maximum (including any
    cover header). 1 page is fine if the material allows it.

    Ruthlessly prioritize. The memo answers exactly three questions:
    1. What changed? (new data, milestones hit, status updates)
    2. What matters? (implications, risks, decisions needed)
    3. What to do next? (action items, watchlist)

    Cut everything the reader already knows:
    - No competitive analysis (why incumbents can't replicate, etc.)
    - No macro context (power supercycle, geopolitical trends, tokenization wave)
    - No deep technical explanations (how FDT works, why stablecoins fail, etc.)
    - No investment thesis recaps or valuation frameworks
    - No history or background sections

    Assume full prior context. If a fact only matters because of context the
    reader already has, state the fact without re-explaining the context.

    Use bullet lists freely — this is a memo, not a report. Paragraphs only
    where narrative flow adds clarity.

    HARD CONSTRAINT: No single bullet list may exceed 5 items. If you have
    more than 5 updates, group related items into thematic bullets (e.g.,
    "Trading volumes:" covering LNG + Gold in one bullet) or convert
    overflow items to prose paragraphs after the list. Count your bullets
    before writing — if a list has 6+, restructure immediately.

    Sections should be minimal: 2-4 sections total. No subsections.
    One level of headings only (##).
  frontmatter_note: |
    Frontmatter colors describe the source material. The memo itself uses
    minimal styling — no brand colors needed.
    Do NOT include key_metrics — this memo is too short for stat callouts.

design:
  aesthetic: |
    Clean, functional, no-nonsense — like a one-page executive briefing
    printed on a single sheet of paper. Think board memo, not report.
  accent_color: |
    Slate blue or muted gray. Minimal color use. One accent color max,
    used only for rules and section labels.
  fonts:
    body: "Georgia at 10pt"
    headings: "Georgia bold, same family as body"
  body_size: "10pt"
  cover: |
    NO separate cover page. The memo starts with a simple header block:
    title, date, and distribution line — then immediately into content.
    The header should take no more than 1 inch of vertical space.
  columns: "Single column only."
  page_limit: |
    HARD CONSTRAINT: 2 pages maximum on US Letter (8.5x11in).
    No cover page — content starts on page 1.
    No stat callouts, no pull quotes, no card grids.
    No section-header-group wrappers — just bare <h2> with page-break-after: avoid.
    Margins: 0.75 inch (tighter than default to maximize content area).
    Line height: 1.4 (tighter than default).
    Section spacing: 12pt between sections (not the default 24pt+).
    If content won't fit in 2 pages, the Content Agent wrote too much — route back.

qa:
  body_size_range: "9-11pt"
  min_margins: "0.75in"
  max_colors: 2
  max_pages: 2
  screenshot_test: |
    Looks like a one-page executive briefing or board memo. Dense but
    readable. No decorative elements. Would not look out of place
    printed and handed out at a board meeting.
  type_specific_notes: |
    HARD FAIL if the PDF exceeds 2 pages. Route to content agent to cut.
    HARD FAIL if memo contains competitive analysis, macro context,
    technical deep-dives, or investment thesis material — route to content.
    Disclaimer text is optional for internal memos. If present, it must
    fit on the last page without pushing content past the 2-page limit.
