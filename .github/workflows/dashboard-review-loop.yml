name: Dashboard Review Loop

on:
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-review-loop.yml"
  push:
    branches:
      - main
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-review-loop.yml"

jobs:
  dashboard-quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate review loop
        run: python ./.claude/hooks/check-dashboard-loop.py

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Required e2e path
        run: npm run test:e2e
